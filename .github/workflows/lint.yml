name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      
      - name: Run ShellCheck
        run: |
          find src -name "*.sh" -type f -exec shellcheck -x {} +
          shellcheck src/pkg
          shellcheck install
          shellcheck uninstall
          shellcheck tests/run_all_tests.sh
          find tests -name "*.bats" -type f -exec shellcheck -x {} +

  makefile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install make
        run: sudo apt-get update && sudo apt-get install -y make

      - name: Validate Makefile targets exist
        run: |
          make --dry-run install
          make --dry-run uninstall
          make --dry-run clean
          make --dry-run test
